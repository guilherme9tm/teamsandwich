<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résultats — Team Sandwich</title>
  <meta name="description" content="Résultats de recherche de cartes MTG">
  <link rel="icon" href="assets/icons/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/card.css">
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <a href="index.html" class="back-btn" aria-label="Retour">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      <span>Retour</span>
    </a>

    <img src="assets/images/IMG_6262.jpg" alt="Team Sandwich Logo" class="header-logo">

    <div class="header-spacer"></div>
  </header>

  <!-- ===== SEARCH INFO ===== -->
  <section class="search-info" id="searchInfo">
    <h1 class="search-title" id="searchTitle">Recherche...</h1>
    <p class="search-subtitle" id="searchSubtitle"></p>
  </section>

  <!-- ===== PAGINATION BAR ===== -->
  <section class="pagination-bar" id="paginationBar">
    <div class="per-page-selector">
      <label for="perPageSelect">Cartes par page :</label>
      <select id="perPageSelect" onchange="changePerPage(this.value)">
        <option value="15" selected>15</option>
        <option value="30">30</option>
        <option value="45">45</option>
        <option value="60">60</option>
        <option value="75">75</option>
        <option value="all">Toutes</option>
      </select>
    </div>
    <div class="page-nav" id="pageNav"></div>
  </section>

  <!-- ===== RESULTS GRID ===== -->
  <section class="results-section">
    <div id="resultado" class="grid"></div>
  </section>

  <!-- ===== BOTTOM PAGINATION ===== -->
  <section class="pagination-bar pagination-bottom" id="paginationBarBottom">
    <div class="page-nav" id="pageNavBottom"></div>
  </section>

  <script src="js/card.js"></script>

</body>

</html>

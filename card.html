<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résultats — Team Sandwich</title>
  <meta name="description" content="Résultats de recherche de cartes MTG">
  <link rel="icon" href="assets/icons/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/card.css">
</head>

<body>

<div class="app-container" id="appContainer">

  <!-- ===== COLLAPSIBLE SIDEBAR ===== -->
  <aside class="sidebar collapsed" id="sidebar"></aside>

  <!-- Mobile overlay -->
  <div class="menu-overlay" id="menuOverlay" onclick="toggleSidebarMobile()"></div>

  <!-- ===== MAIN WRAPPER ===== -->
  <div class="main-layout" id="mainLayout">

    <!-- HEADER -->
    <header class="header" id="header">
      <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebarMobile()" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>

      <a href="index.html" class="logo-link-header">
        <img src="assets/images/IMG_6262.jpg" alt="Team Sandwich Logo" class="header-logo">
      </a>

      <!-- Search Bar -->
      <div class="header-search-container">
        <div class="search-input-wrapper">
          <input type="text" id="headerSearchInput" class="search-input" data-i18n="searchPlaceholder" placeholder="Rechercher une carte, collection, numéro...">
          <button class="search-clear-btn" id="searchClearBtn" onclick="clearHeaderSearch()">&times;</button>
          <button class="search-btn" id="searchSubmitBtn" onclick="submitHeaderSearch()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
        </div>
        <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
      </div>

      <div class="header-spacer"></div>

      <!-- Language -->
      <div class="lang-selector">
        <select class="lang-selector-select" aria-label="Language">
          <option value="fr">FR</option>
          <option value="en">EN</option>
        </select>
      </div>

      <!-- User Actions -->
      <div class="user-actions" id="headerUserActions">
        <button class="btn-login-header" onclick="openLoginModal()" data-i18n="login">Connexion</button>
        <button class="btn-signup-header" onclick="openSignupModal()" data-i18n="signup">S'inscrire</button>
      </div>
    </header>

    <!-- SEARCH INFO -->
    <section class="search-info" id="searchInfo">
      <h1 class="search-title" id="searchTitle">Recherche...</h1>
      <p class="search-subtitle" id="searchSubtitle"></p>
    </section>

    <!-- PAGINATION BAR -->
    <section class="pagination-bar" id="paginationBar">
      <div class="per-page-selector">
        <label for="perPageSelect">Cartes par page :</label>
        <select id="perPageSelect" onchange="changePerPage(this.value)">
          <option value="15" selected>15</option>
          <option value="30">30</option>
          <option value="45">45</option>
          <option value="60">60</option>
          <option value="75">75</option>
          <option value="all">Toutes</option>
        </select>
      </div>
      <div class="page-nav" id="pageNav"></div>
    </section>

    <!-- RESULTS GRID -->
    <section class="results-section">
      <div id="resultado" class="grid"></div>
    </section>

    <!-- BOTTOM PAGINATION -->
    <section class="pagination-bar pagination-bottom" id="paginationBarBottom">
      <div class="page-nav" id="pageNavBottom"></div>
    </section>
  </div>
</div>

<!-- COLLECTIONS MODAL -->
<div class="collections-modal-overlay" id="collectionsModalOverlay" onclick="closeCollectionsModal()"></div>
<div class="collections-modal" id="collectionsModal">
  <div class="collections-modal-header">
    <h2 data-i18n="allCollections">Toutes les Collections</h2>
    <button class="modal-close-btn" onclick="closeCollectionsModal()">&times;</button>
  </div>
  <div class="collections-modal-toolbar">
    <div class="collections-search-wrapper">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="collectionsSearchInput" class="collections-search-input" data-i18n="searchCollections" placeholder="Rechercher une collection...">
    </div>
    <div class="collections-sort-group">
      <button class="collections-sort-btn active" data-sort="newest" onclick="setCollectionsSort('newest')" data-i18n="sortNewest">Plus récentes</button>
      <button class="collections-sort-btn" data-sort="oldest" onclick="setCollectionsSort('oldest')" data-i18n="sortOldest">Plus anciennes</button>
      <button class="collections-sort-btn" data-sort="az" onclick="setCollectionsSort('az')" data-i18n="sortAZ">A → Z</button>
      <button class="collections-sort-btn" data-sort="za" onclick="setCollectionsSort('za')" data-i18n="sortZA">Z → A</button>
    </div>
  </div>
  <div class="collections-modal-body">
    <div class="collections-grid" id="collectionsGrid"></div>
  </div>
</div>

<!-- AUTH MODALS -->
<div class="modal-overlay" id="authModalOverlay" onclick="closeAuthModals()"></div>
<div class="auth-modal" id="loginModal">
  <button class="modal-close-btn" onclick="closeAuthModals()">&times;</button>
  <h2 data-i18n="modalLoginTitle">Connexion à votre compte</h2>
  <form id="loginForm" onsubmit="handleLoginSubmit(event)">
    <div class="input-group"><input type="email" id="loginEmail" required data-i18n="emailPlaceholder" placeholder="Adresse e-mail"></div>
    <div class="input-group"><input type="password" id="loginPassword" required data-i18n="passwordPlaceholder" placeholder="Mot de passe"></div>
    <button type="submit" class="btn-primary auth-submit-btn" data-i18n="modalLoginBtn">Se connecter</button>
  </form>
  <p class="auth-switch" onclick="switchToSignup(event)"><a href="#" data-i18n="dontHaveAccount">Pas encore de compte ? S'inscrire</a></p>
</div>
<div class="auth-modal" id="signupModal">
  <button class="modal-close-btn" onclick="closeAuthModals()">&times;</button>
  <h2 data-i18n="modalSignupTitle">Créer un compte</h2>
  <form id="signupForm" onsubmit="handleSignupSubmit(event)">
    <div class="input-group"><input type="text" id="signupUsername" required data-i18n="usernamePlaceholder" placeholder="Nom d'utilisateur"></div>
    <div class="input-group"><input type="email" id="signupEmail" required data-i18n="emailPlaceholder" placeholder="Adresse e-mail"></div>
    <div class="input-group"><input type="password" id="signupPassword" required data-i18n="passwordPlaceholder" placeholder="Mot de passe"></div>
    <button type="submit" class="btn-primary auth-submit-btn" data-i18n="modalSignupBtn">S'inscrire</button>
  </form>
  <p class="auth-switch" onclick="switchToLogin(event)"><a href="#" data-i18n="alreadyHaveAccount">Vous avez déjà un compte ? Se connecter</a></p>
</div>

<script src="js/i18n.js"></script>
<script src="js/common.js"></script>
<script src="js/card.js"></script>

</body>
</html>

<style>
body {
  font-family: Arial;
  margin: 0;
  background:#111;
  color:white;
  text-align:center;
}

.header {
  height:220px;
  background:#454545;
  display:flex;
  justify-content:center;
  align-items:center;
  gap: 20px;
}

.header img { width:60%; max-width:500px; }

/* MENU PRINCIPAL */
.form-container {
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:20px;
  flex-wrap:nowrap;
  margin:20px;
}

.file-block, .search-block {
  background-color: rgba(255,255,255,0.08);
  padding:15px;
  border-radius:20px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  width:280px;
}

.block-title {
  font-size:1.2rem;
  margin-bottom:10px;
  font-weight:bold;
  text-align:center;
}

input {
  width:100%;
  padding:4px 8px;
  border-radius:8px;
  border:none;
  font-size:1rem;
  text-align:center;
}

button {
  padding:4px 8px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-size:1rem;
  background:#444;
  color:white;
  transition:0.2s;
  gap: 20px;
}

button:hover {
  background:#666;
  transform:scale(1.05);
  gap: 20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  margin:20px;
}

.card {
  border:1px solid rgba(255,255,255,0.5);
  padding:10px;
  border-radius:8px;
  background:rgba(0,0,0,0.5);
}

/* LINKS */
.links-container {
  display:flex;
  justify-content:center;
  gap:10px;
}

.links-column {
  display:flex;
  flex-direction:column;
  gap:5px;
}

.links-column a {
  width:84px;height:84px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f0f0f0;
  border-radius:8px;
  transition:0.25s;
}

.links-column a:hover {
  transform:scale(1.1);
}

.links-column img { width:52px; }

/* DROPDOWN */
.dropdown {
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

.dropdown-btn {
  padding:6px;
  background:#fff;
  color:black;
  border-radius:8px;
  cursor:pointer;
}

.dropdown-content {
  position:absolute;
  top:100%;
  left:0;
  background:#757575;
  border-radius:8px;
  opacity:0;
  transform:translateY(-10px);
  pointer-events:none;
  transition:0.25s;
  padding:10px;
}

.dropdown:hover .dropdown-content {
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.store-item {
  display:flex;
  align-items:center;
  gap:10px;
  margin:5px;
}

.store-item img { width:30px; }

/* MOBILE */
@media (max-width:600px){
  .form-container {
    flex-direction:column;
    align-items:center;
  }
}
.form-container {
  display: flex;
  gap: 20px;
  width: 100%;
}

.file-block, .search-block {
  flex: 1;
}
#setList {
  max-height: 300px;
  overflow-y: auto;
}
/* 📱 MOBILE HEADER FIX */
@media (max-width:600px){

.header{
  height:auto;
  padding:10px;
  flex-direction:column;
  gap:10px;
}

.header img{
  width:80%;
  max-width:250px;
}

/* as 4 divs ficam organizadas */
.header > div{
  width:100%;
  max-width:320px;
}

.file-block,
.search-block,
.dropdown{
  width:100%;
  padding:10px;
  box-sizing:border-box;
}

.block-title{
  font-size:0.9rem;
}

input{
  font-size:0.9rem;
  padding:6px;
}

button{
  font-size:0.85rem;
  padding:6px;
}

/* melhora layout interno da search */
.search-block div{
  flex-direction:column;
  gap:5px;
}
/* 📱 GRID 2 COLUNAS MOBILE */
@media (max-width:600px){

#resultado{
  grid-template-columns: repeat(2, 1fr);
  gap:10px;
}

.card{
  padding:6px;
}

.card img{
  width:100%;
  height:auto;
}
}
/* 🔽 conteúdo escondido */
.card-extra{
  display:none;
  margin-top:8px;
}

/* botão toggle */
.toggle-btn{
  margin-top:6px;
  width:100%;
  background:#222;
  border:1px solid #555;
  font-size:0.8rem;
}
}
.card-extra{
  display:none;
}

.toggle-btn{
  width:100%;
  margin-top:5px;
}
/* 📱 DROPDOWN MENOR NO MOBILE */
@media (max-width:600px){

.dropdown-btn{
  font-size:0.8rem;
  padding:5px 8px;
}

.dropdown-content{
  transform: scale(0.9);
  transform-origin: top left;
  font-size:0.75rem;
  padding:6px;
}

.store-item{
  gap:6px;
  margin:3px 0;
}

.store-item img{
  width:22px;
}

}
/* 🔝 garante que o dropdown fique acima de tudo */
.dropdown{
  position: relative;
  z-index: 1000;
}

.dropdown-content{
  z-index: 9999; /* bem acima */
}
/* alinhamento correto dos itens */
.store-item{
  display:flex;
  align-items:center;
  justify-content: space-between;
  gap:10px;
}

/* bloco da esquerda (logo + nome) */
.store-left{
  display:flex;
  align-items:center;
  gap:8px;
}

/* checkbox fixo à direita */
.store-item input[type="checkbox"]{
  margin-left:auto;
}
/* 📱 DROPDOWNS LADO A LADO NO MOBILE */
@media (max-width:600px){

/* container dos dropdowns */
.header{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
}

/* os dois dropdowns */
#setDropdown,
#storeDropdown{
  width:48%;
}

/* botões internos */
.dropdown-btn{
  width:100%;
  font-size:0.75rem;
  padding:6px;
}
/* 📱 DROPDOWNS LADO A LADO (CORRETO) */
@media (max-width:600px){

.dropdown-row{
  display:flex;
  width:100%;
  gap:8px;
  justify-content:center;
}

.dropdown-row .dropdown{
  width:48%;
}

}
.dropdown-row{
  max-width:320px;
}
}

/* DROPDOWN */
function toggleDropdown(){
  document.getElementById("dropdown").classList.toggle("open");
}

function initStores(){
  const saved = JSON.parse(localStorage.getItem("stores")||"[]");
  const container = document.getElementById("storeList");

  sites.forEach(site=>{
    const checked = saved.length ? saved.includes(site.id) : true;

    const div = document.createElement("div");
    div.className="store-item";
    div.innerHTML=`
      <input type="checkbox" value="${site.id}" ${checked?"checked":""}>
      <img src="${site.logo}">
      ${site.nome}
    `;
    container.appendChild(div);
  });
}
async function loadSets() {
  const res = await fetch("https://api.scryfall.com/sets");
  const data = await res.json();

  const container = document.getElementById("setList");

  // ordenar do mais recente pro mais antigo
  const sets = data.data.sort((a, b) => 
    new Date(b.released_at) - new Date(a.released_at)
  );

  sets.forEach(set => {
    if (!set.icon_svg_uri) return;

    const div = document.createElement("div");
    div.className = "store-item";

    div.innerHTML = `
      <img src="${set.icon_svg_uri}" width="24">
      <span>${set.code.toUpperCase()} - ${set.name}</span>
    `;

    div.style.cursor = "pointer";

    div.onclick = () => carregarColecao(set.code);

    container.appendChild(div);
  });
}
async function carregarColecao(code) {
  const container = document.getElementById("resultado");
  container.innerHTML = "Chargement des cartes...";

  let url = `https://api.scryfall.com/cards/search?q=set:${code}`;
  container.innerHTML = "";

  while (url) {
    const res = await fetch(url);
    const data = await res.json();

    for (let card of data.data) {
      await buscarCarta(card.name, container);
    }

    url = data.has_more ? data.next_page : null;
  }
}
function toggleSetDropdown() {
  document.getElementById("setDropdown").classList.toggle("open");
}
function getSelected(){
  const boxes=document.querySelectorAll("#storeList input");
  const selected=[];
  boxes.forEach(b=>{ if(b.checked) selected.push(b.value); });
  localStorage.setItem("stores",JSON.stringify(selected));
  return selected;
}

/* 🔥 TON CODE ORIGINAL RESTAURÉ */
async function processarArquivo() {
  const arquivoInput = document.getElementById('arquivoInput');
  if (!arquivoInput.files.length) return alert('Veuillez choisir un fichier TXT');

  const texto = await arquivoInput.files[0].text();
  const linhas = texto.split(/\r?\n/);
  const cartas = [];

  linhas.forEach(linha => {
    const l = linha.trim();
    if (!l) return;

    const match = l.match(/^(\d+)\s+(.+)$/);
    if (match) {
      const qtd = parseInt(match[1], 10);
      const nome = match[2];
      for (let i = 0; i < qtd; i++) cartas.push(nome);
    } else {
      cartas.push(l);
    }
  });

  const resultado = document.getElementById('resultado');
  resultado.innerHTML="Chargement...";

  await new Promise(r=>setTimeout(r,300));
  resultado.innerHTML="";

  for (let nome of cartas){
    await buscarCarta(nome, resultado);
    await new Promise(r=>setTimeout(r,100));
  }
}

async function buscarCartaManuellement(){
  const nome = document.getElementById("pesquisaInput").value.trim();
  if(!nome) return alert("Entrez un nom");
  await buscarCarta(nome, document.getElementById("resultado"));
}
function limparResultado() {
  const resultadoDiv = document.getElementById('resultado');
  resultadoDiv.innerHTML = "";
}
function toggleCard(btn){
  const extra = btn.nextElementSibling;

  if(extra.style.display === "block"){
    extra.style.display = "none";
    btn.textContent = "Afficher plus";
  } else {
    extra.style.display = "block";
    btn.textContent = "Masquer";
  }
}
async function buscarCarta(nome, container){
  const n = encodeURIComponent(nome);

  let res = await fetch(`https://api.scryfall.com/cards/named?exact=${n}`);
  if(!res.ok){
    res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${n}`);
  }
  if(!res.ok){
    container.innerHTML+=`<p>Carte non trouvée : ${nome}</p>`;
    return;
  }

  const data = await res.json();

  let img = data.image_uris?.small || data.card_faces?.[0]?.image_uris?.small;
  if(img) img = img.split('?')[0];

  const usd = parseFloat(data.prices?.usd)||parseFloat(data.prices?.usd_foil)||0;
  const cad = usd?`CAD ${(usd*1.38).toFixed(2)}`:"Prix indisponible";

  const selected = getSelected();

  const card=document.createElement("div");
card.className="card";

/* PARTE VISÍVEL */
if(img) card.innerHTML+=`<img src="${img}">`;

card.innerHTML+=`
  <strong>${nome}</strong><br>
  <em>${cad}</em>

  <button class="toggle-btn" onclick="toggleCard(this)">
    Afficher plus
  </button>
`;

/* CONTAINER ESCONDIDO */
const extra = document.createElement("div");
extra.className = "card-extra";

  const links=document.createElement("div");
  links.className="links-container";

  const c1=document.createElement("div");
  const c2=document.createElement("div");
  c1.className=c2.className="links-column";

  let i=0;

  sites.forEach(site=>{
    if(!selected.includes(site.id)) return;

    const a=document.createElement("a");
    a.href=site.link(n);
    a.target="_blank";

    const im=document.createElement("img");
    im.src=site.logo;

    a.appendChild(im);
    (i++%2===0?c1:c2).appendChild(a);
  });

  links.appendChild(c1);
links.appendChild(c2);

/* joga os links dentro da parte escondida */
extra.appendChild(links);

/* adiciona no card */
card.appendChild(extra);

container.appendChild(card);
}

initStores();
loadSets();
</script>
